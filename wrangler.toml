name = "tg-reaction-bot"
main = "src/index.js"
compatibility_date = "2024-09-23"

# D1 database binding.
# Create the database first with:
#   wrangler d1 create tg-reaction-bot-db
# then copy the "database_id" it prints into the value below.
[[d1_databases]]
binding = "DB"
database_name = "tg-reaction-bot-db"
database_id = "REPLACE_WITH_YOUR_DATABASE_ID"
